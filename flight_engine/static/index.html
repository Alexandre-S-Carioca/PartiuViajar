<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partiu Viajar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-mesh"></div>
    <div class="container">
        <header>
            <h1>Partiu<span>Viajar</span></h1>
            <p>O primeiro metabuscador de passagens em tempo real.</p>
        </header>
        
        <main>
            <section class="search-panel glass">
                <form id="search-form">
                    <div class="input-group autocomplete-wrapper">
                        <label for="origin">Origem</label>
                        <input type="text" id="origin" placeholder="Ex: FOR, São Paulo" autocomplete="off" required>
                        <div id="origin-suggestions" class="suggestions-dropdown hidden"></div>
                    </div>
                    <div class="input-group autocomplete-wrapper">
                        <label for="destination">Destino</label>
                        <input type="text" id="destination" placeholder="Ex: SCL, Santiago" autocomplete="off" required>
                        <div id="destination-suggestions" class="suggestions-dropdown hidden"></div>
                    </div>
                    <div class="input-group">
                        <label for="departure_date">Data de Ida</label>
                        <input type="date" id="departure_date" required>
                    </div>
                    <div class="input-group">
                        <label for="return_date">Data de Volta (Opcional)</label>
                        <input type="date" id="return_date">
                    </div>
                    <div class="input-group">
                        <button type="submit" id="search-btn">Buscar Voos</button>
                    </div>
                </form>
            </section>
            
            <section class="results-panel">
                <div id="loader" class="hidden">
                    <div class="spinner"></div>
                    <p>Buscando nas companhias aéreas em tempo real...</p>
                </div>
                <div class="grid" id="flights-grid">
                    <!-- Cards de voos aparecerão aqui via JS -->
                </div>
            </section>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
