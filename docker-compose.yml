version: '3.8'

services:

  db:
    image: postgres:15
    container_name: partiu_viajar_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: partiu_viajar_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: partiu_viajar_api
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=False
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./static:/app/static
      - ./flight_engine:/app/flight_engine
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: partiu_viajar_worker
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=False
    volumes:
      - ./flight_engine:/app/flight_engine
    # É recomendável ter mais threads (ou processos) para workers executarem playwright em paralelo
    command: python -m dramatiq workers.tasks -p 2 -t 2
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  redis_data:
  postgres_data:

