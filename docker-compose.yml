version: '3.8'

services:

  redis:
    image: redis:7-alpine
    container_name: partiu_viajar_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: partiu_viajar_api
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=False
    expose:
      - "8000"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: partiu_viajar_worker
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=False
    # É recomendável ter mais threads (ou processos) para workers executarem playwright em paralelo
    command: python -m dramatiq workers.tasks -p 2 -t 2
    depends_on:
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: partiu_viajar_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  redis_data:
  caddy_data:
  caddy_config:
